name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Java 21 / Maven)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Compile
        run: mvn -B -ntp compile

      - name: Run tests
        run: mvn -B -ntp test

      - name: Package
        if: github.event_name == 'push'
        run: mvn -B -ntp -DskipTests package

      - name: Upload jar
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: autograder-backend-jar
          path: backend/target/*.jar
          retention-days: 7

  frontend:
    name: Frontend (placeholder)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Note
        run: echo "Frontend scaffolding lands in a later milestone; CI is a placeholder."
